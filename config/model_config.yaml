# LLM Provider Configuration
providers:
  openai:
    api_key_env: OPENAI_API_KEY
    models:
      gpt4:
        name: gpt-4-turbo
        max_tokens: 4096
        temperature: 0.7
      gpt35:
        name: gpt-3.5-turbo
        max_tokens: 2048
        temperature: 0.7

  anthropic:
    api_key_env: ANTHROPIC_API_KEY
    models:
      claude_opus:
        name: claude-opus-4-7
        max_tokens: 4096
        temperature: 0.7
      claude_sonnet:
        name: claude-sonnet-4-6
        max_tokens: 4096
        temperature: 0.7

  local:
    models:
      llama:
        model_path: models/llama-2-7b
        context_length: 4096
        temperature: 0.7

# Embedding Configuration
embeddings:
  provider: openai
  model: text-embedding-3-small
  dimension: 1536
  batch_size: 100

# RAG Configuration
rag:
  chunk_size: 512
  chunk_overlap: 50
  top_k: 5
  similarity_threshold: 0.7
